# render.yaml — Infrastructure as Code
# Déposer à la racine du repo. Render lit ce fichier pour créer les services.
# Doc : https://render.com/docs/infrastructure-as-code

services:
  # ── API Django ────────────────────────────────────────────────
  - type: web
    name: lily-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free            # ou "starter" pour 0-downtime + RAM supérieure
    healthCheckPath: /api/v1/products/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true          # Render génère automatiquement
      - key: DATABASE_URL
        fromDatabase:
          name: lily-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: lily-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://lily-florist.onrender.com
      - key: DEFAULT_FROM_EMAIL
        value: noreply@lilys-florist.com
      # Variables optionnelles — à renseigner manuellement dans le dashboard Render :
      # EMAIL_HOST_PASSWORD (SendGrid API key)
    buildCommand: |
      pip install -r requirements/base.txt &&
      python manage.py migrate --noinput &&
      python manage.py loaddata apps/products/fixtures/initial_products.json

  # ── Frontend React (Static Site) ──────────────────────────────
  - type: web
    name: lily-florist
    runtime: static
    rootDir: frontend
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        value: https://lily-api.onrender.com

# ── Base de données Neon (référencée, pas créée ici) ──────────────
# Neon est géré séparément sur neon.tech.
# La DATABASE_URL est à coller dans : Render dashboard → lily-api → Environment
# Format : postgresql://user:password@host/db?sslmode=require
#
# Si tu veux utiliser une DB Render native à la place de Neon :
# databases:
#   - name: lily-db
#     plan: free
#     databaseName: lily_florist
#     user: lily
