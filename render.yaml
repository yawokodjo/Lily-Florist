# render.yaml — place à la RACINE du repo

services:

  # ── API Django ──────────────────────────────
  - type: web
    name: lily-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/products/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false    # ← renseigner manuellement après deploy
      - key: ALLOWED_HOSTS
        value: lily-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://lily-florist.onrender.com
      - key: DEFAULT_FROM_EMAIL
        value: noreply@lilys-florist.com
    buildCommand: |
      pip install -r requirements/base.txt &&
      python manage.py migrate --noinput &&
      python manage.py loaddata
        apps/products/fixtures/initial_products.json

  # ── Frontend React ──────────────────────────
  - type: web
    name: lily-florist
    runtime: static
    rootDir: frontend
    buildCommand: >-
      npx pnpm install --frozen-lockfile &&
      npx pnpm build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        value: https://lily-api.onrender.com