name: CI — Lint · Test · Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  backend:
    name: 🐍 Backend (Django)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lily_test
          POSTGRES_USER: lily
          POSTGRES_PASSWORD: lily_test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgres://lily:lily_test_password@localhost:5432/lily_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      DJANGO_DEBUG: "True"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements/dev.txt

      - name: Lint (ruff)
        run: |
          cd backend
          ruff check .
          ruff format --check .

      - name: Type check (mypy)
        run: cd backend && mypy apps/

      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ -v --cov=apps --cov-report=xml --cov-fail-under=80 -n auto

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend

      - name: Security audit (pip-audit)
        run: cd backend && pip-audit -r requirements/base.txt

  # ─────────────────────────────────────────────────────────────────
  frontend:
    name: ⚛️  Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20 + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: cd frontend && pnpm lint

      - name: Type check
        run: cd frontend && pnpm type-check

      - name: Unit tests (Vitest)
        run: cd frontend && pnpm test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          flags: frontend

      - name: Build
        run: cd frontend && pnpm build
        env:
          VITE_API_URL: https://lily-api.onrender.com

      - name: Security audit (npm audit)
        run: cd frontend && pnpm audit --audit-level=high

  # ─────────────────────────────────────────────────────────────────
  e2e:
    name: 🎭 E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20 + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g pnpm && cd frontend && pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd frontend && pnpm playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd frontend && pnpm test:e2e
        env:
          BASE_URL: https://lily-florist.onrender.com

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
